openapi: 3.0.3
info:
  title: MT5 Bridge API Contract
  version: 1.1.0
  description: |
    Contract for existing and additive MT5 bridge endpoints for feature 001-mt5-bridge-dashboard.
    Existing endpoints (/health, /prices, /execute) remain backward compatible.
servers:
  - url: http://localhost:8001
security:
  - ApiKeyAuth: []

tags:
  - name: health
  - name: prices
  - name: execution
  - name: symbols
  - name: logs
  - name: config
  - name: worker
  - name: metrics

paths:
  /health:
    get:
      tags: [health]
      summary: Health status (existing; unchanged)
      responses:
        '200':
          description: Health snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /prices:
    get:
      tags: [prices]
      summary: Historical OHLCV prices (existing; unchanged)
      parameters:
        - in: query
          name: ticker
          required: true
          schema:
            type: string
        - in: query
          name: start_date
          required: true
          schema:
            type: string
            format: date
        - in: query
          name: end_date
          required: true
          schema:
            type: string
            format: date
        - in: query
          name: timeframe
          required: false
          schema:
            type: string
            enum: [M1, M5, M15, M30, H1, H4, D1, W1, MN1]
            default: D1
      responses:
        '200':
          description: Price response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/UnknownTicker'
        '422':
          $ref: '#/components/responses/ValidationError'
        '503':
          $ref: '#/components/responses/Mt5Unavailable'

  /execute:
    post:
      tags: [execution]
      summary: Execute trade (existing endpoint; behavior guarded by execution policy)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TradeRequest'
      responses:
        '200':
          description: Trade execution result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TradeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/UnknownTicker'
        '422':
          $ref: '#/components/responses/ValidationError'
        '503':
          $ref: '#/components/responses/Mt5Unavailable'

  /symbols:
    get:
      tags: [symbols]
      summary: List configured symbols (new)
      responses:
        '200':
          description: Symbol catalog
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SymbolsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /logs:
    get:
      tags: [logs]
      summary: Paginated trade audit log entries (new)
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 50
        - in: query
          name: offset
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Paginated log response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /config:
    get:
      tags: [config]
      summary: Sanitized runtime config snapshot (new)
      responses:
        '200':
          description: Config snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigInfo'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /worker/state:
    get:
      tags: [worker]
      summary: Worker processing state (new)
      responses:
        '200':
          description: Worker state snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkerInfo'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /metrics:
    get:
      tags: [metrics]
      summary: Operational metrics summary (new)
      responses:
        '200':
          description: Metrics summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricsSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-KEY

  responses:
    Unauthorized:
      description: Missing or invalid API key
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnknownTicker:
      description: Unknown ticker or symbol
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: Input validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Mt5Unavailable:
      description: MT5 terminal unavailable/disconnected
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      properties:
        detail:
          oneOf:
            - type: string
            - type: array
              items:
                type: object
      required: [detail]

    HealthStatus:
      type: object
      properties:
        connected: { type: boolean }
        authorized: { type: boolean }
        broker: { type: string, nullable: true }
        account_id: { type: integer, nullable: true }
        balance: { type: number, nullable: true }
        server_time_offset: { type: integer, nullable: true }
        latency_ms: { type: integer, nullable: true }
      required: [connected, authorized]

    Price:
      type: object
      properties:
        open: { type: number }
        close: { type: number }
        high: { type: number }
        low: { type: number }
        volume: { type: integer }
        time: { type: string, description: ISO-8601 UTC timestamp }
      required: [open, close, high, low, volume, time]

    PriceResponse:
      type: object
      properties:
        ticker: { type: string }
        prices:
          type: array
          items:
            $ref: '#/components/schemas/Price'
      required: [ticker, prices]

    TradeRequest:
      type: object
      properties:
        ticker: { type: string }
        action:
          type: string
          enum: [buy, sell, short, cover]
        quantity:
          type: number
          exclusiveMinimum: 0
        current_price:
          type: number
          exclusiveMinimum: 0
        multi_trade_mode:
          type: boolean
          default: false
      required: [ticker, action, quantity, current_price]

    TradeResponse:
      type: object
      properties:
        success: { type: boolean }
        filled_price: { type: number, nullable: true }
        filled_quantity: { type: number, nullable: true }
        ticket_id: { type: integer, nullable: true }
        error: { type: string, nullable: true }
      required: [success]

    SymbolInfo:
      type: object
      properties:
        ticker: { type: string }
        mt5_symbol: { type: string }
        lot_size: { type: number }
        category: { type: string }
      required: [ticker, mt5_symbol, lot_size, category]

    SymbolsResponse:
      type: object
      properties:
        symbols:
          type: array
          items:
            $ref: '#/components/schemas/SymbolInfo'
      required: [symbols]

    LogEntry:
      type: object
      properties:
        timestamp: { type: string }
        request: { type: object, additionalProperties: true }
        response: { type: object, additionalProperties: true }
      required: [timestamp, request, response]

    LogsResponse:
      type: object
      properties:
        total: { type: integer }
        offset: { type: integer }
        limit: { type: integer }
        entries:
          type: array
          items:
            $ref: '#/components/schemas/LogEntry'
      required: [total, offset, limit, entries]

    ConfigInfo:
      type: object
      properties:
        mt5_bridge_port: { type: integer }
        mt5_server: { type: string }
        mt5_login: { type: integer, nullable: true }
        mt5_path: { type: string, nullable: true }
        log_level: { type: string }
        symbol_count: { type: integer }
        symbols_config_path: { type: string }
        execution_enabled: { type: boolean }
        metrics_retention_days: { type: integer, enum: [90] }
        multi_trade_overload_queue_threshold: { type: integer }
      required:
        [mt5_bridge_port, mt5_server, log_level, symbol_count, symbols_config_path, execution_enabled, metrics_retention_days, multi_trade_overload_queue_threshold]

    WorkerInfo:
      type: object
      properties:
        state: { type: string }
        queue_depth: { type: integer }
        max_reconnect_retries: { type: integer }
        reconnect_base_delay: { type: number }
      required: [state, queue_depth, max_reconnect_retries, reconnect_base_delay]

    MetricsSummary:
      type: object
      properties:
        uptime_seconds: { type: number }
        total_requests: { type: integer }
        requests_by_endpoint:
          type: object
          additionalProperties:
            type: integer
        errors_count: { type: integer }
        last_request_at: { type: string, nullable: true }
        retention_days: { type: integer, enum: [90] }
      required: [uptime_seconds, total_requests, requests_by_endpoint, errors_count, retention_days]
