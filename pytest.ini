[pytest]
minversion = 8.0
addopts = -q --cov=app --cov-config=.coveragerc --cov-report=term-missing --cov-fail-under=90
testpaths = tests
asyncio_mode = auto
python_files = test_*.py
markers =
    unit: Fast unit tests with no external dependencies.
    integration: API and route-level tests.
    contract: Contract/spec conformance tests.
    performance: Performance and latency guardrail tests.
    smoke: Minimal runtime validation tests for quick checks.
